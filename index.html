<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://kit.fontawesome.com/28bbd88697.js" crossorigin="anonymous"></script>
    <title>PIxelOS</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: cornsilk;
        }

        .rotateAnim {
            animation: rotate 12s linear infinite
        }

        #lineAnim,
        #lineAnim2,
        #lineAnim3,
        #lineAnim4 {
            position: relative;
            display: inline-block;
        }

        #lineAnim::before,
        #lineAnim2::before,
        #lineAnim3::before,
        #lineAnim4::before {
            content: '';
            position: absolute;
            width: 60px;
            height: 2px;
            background: black;
            bottom: -5px;
            right: 0px;
            transform: scaleX(0);
            transform-origin: left;
            transition: 0.4s ease;
        }

        #lineAnim2::before {
            width: 90px;
            left: 5px;
        }

        #lineAnim3::before,
        #lineAnim4::before {
            width: 50px;
            left: 1px;
        }


        #lineAnim:hover::before,
        #lineAnim2:hover:before,
        #lineAnim3:hover:before,
        #lineAnim4:hover:before {
            transform: scaleX(1);
        }


        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="relative">
        <img class="rotateAnim absolute w-100 h-100 translate-x-[-30%] translate-y-[-30%] top-0 left-0"
            src="./assets/Monetp-y.e961e8c9.png" alt="">
        <img class="rotateAnim absolute w-100 h-100  translate-x-[45%] translate-y-[-12%] top-0 right-0"
            src="./assets/Monetp-w.15ff3937.png" alt="">

        <img class="rotateAnim absolute w-100 h-100 translate-x-[-40%] translate-y-[100%] left-0"
            src="./assets/Monetp-b.4a3475b4.png" alt="">
        <img class="rotateAnim absolute w-100 h-100  translate-x-[25%] translate-y-[100%]  right-0"
            src="./assets/Monetp-t.603e5c4b.png" alt="">

    </div>

    <div class="absolute mt-6 w-[100%] flex items-center gap-80 justify-around ">
        <div class="flex items-center cursor-pointer">
            <img src="./assets/logo.70498e13.svg" alt="">
            <h3 class="text-2xl font-bold text-[#49473e]">PixelOS</h3>
        </div>

        <div class="lg:flex gap-10 justify-end hidden">
            <p id="lineAnim" class="text-[#42413b] font-medium text-xl cursor-pointer">About</p>
            <p id="lineAnim2" class="text-[#3f3e39] font-medium text-xl cursor-pointer">Download</p>
            <p id="lineAnim3" class="text-[#49473e] font-medium text-xl cursor-pointer">Team</p>
            <p id="lineAnim4" class="text-[#49473e] font-medium text-xl cursor-pointer">Blog</p>
        </div>

        <!-- medium device -->
         <div class="text-5xl translate-x-50 lg:hidden ">
            <i class="fa-solid fa-grip-lines"></i>
         </div>
    </div>

    <div class="absolute top-20 flex items-center justify-around">
        <div class="translate-x-20 w-[40%] space-y-5">
            <h2 class="text-5xl font-bold text-[#49473e]">What is PixelOS</h2>
            <p class="text-[#49473e] text-xl">PixelOS is an AOSP based ROM, with Google apps included and all Pixel
                goodies. We aim to provide an experience similar to Google Pixel phones with numerous performance
                enhancements and a small amount of useful additional features.</p>
            <button
                class="bg-[#fde694] px-30 py-5 rounded-2xl w-full text-xl font-medium cursor-pointer ease-in-out transform hover:scale-102">Get
                PixelOS</button>
        </div>

        <div class="w-[20%]">
            <img src="./assets/PixelFrame.webp" alt="">
        </div>
    </div>

    <div class="absolute w-[78%] mx-50 bottom-10 flex items-center justify-between">
        <div class="flex items-center gap-2 translate-x[-20%]">
            <svg class="text-[#131312]" xmlns="http://www.w3.org/2000/svg" width="16px" height="16px"
                viewBox="0 0 24 24" fill="#3e3e3d" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round" class="lucide lucide-copyright">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M14.83 14.83a4 4 0 1 1 0-5.66"></path>
            </svg>
            <p class="text-[#3e3e3d] font-medium">2026 PixelOS</p>
        </div>

        <div class="flex gap-8">
            <svg class="text-[#131312] cursor-pointer" stroke="currentColor" fill="currentColor" stroke-width="0"
                viewBox="0 0 16 16" height="1.75rem" width="1.75rem" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8">
                </path>
            </svg>

            <svg class="text-[#131312] cursor-pointer" stroke="currentColor" fill="currentColor" stroke-width="0"
                viewBox="0 0 16 16" height="1.75rem" width="1.75rem" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8.287 5.906q-1.168.486-4.666 2.01-.567.225-.595.442c-.03.243.275.339.69.47l.175.055c.408.133.958.288 1.243.294q.39.01.868-.32 3.269-2.206 3.374-2.23c.05-.012.12-.026.166.016s.042.12.037.141c-.03.129-1.227 1.241-1.846 1.817-.193.18-.33.307-.358.336a8 8 0 0 1-.188.186c-.38.366-.664.64.015 1.088.327.216.589.393.85.571.284.194.568.387.936.629q.14.092.27.187c.331.236.63.448.997.414.214-.02.435-.22.547-.82.265-1.417.786-4.486.906-5.751a1.4 1.4 0 0 0-.013-.315.34.34 0 0 0-.114-.217.53.53 0 0 0-.31-.093c-.3.005-.763.166-2.984 1.09">
                </path>
            </svg>
        </div>
    </div>
</body>

</html>
