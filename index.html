<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>PIxelOS</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: cornsilk;
        }

        .rotateAnim{
            animation : rotate 12s linear infinite
        }

        @keyframes rotate {
           0%{transform: rotate(0deg);}
            100% {transform: rotate(360deg);}
        }

    </style>
</head>

<body>
    <div class="relative">
            <img class="rotateAnim absolute w-100 h-100 translate-x-[-40%] translate-y-[-30%] top-0 left-0" src="./assets/Monetp-y.e961e8c9.png" alt="">
            <img class="rotateAnim absolute w-100 h-100  translate-x-[45%] translate-y-[-12%] top-0 right-0" src="./assets/Monetp-w.15ff3937.png" alt="">
       
            <img class="rotateAnim absolute w-100 h-100 translate-x-[-40%] translate-y-[100%] left-0" src="./assets/Monetp-b.4a3475b4.png" alt="">
            <img class="rotateAnim absolute w-100 h-100  translate-x-[25%] translate-y-[100%]  right-0" src="./assets/Monetp-t.603e5c4b.png" alt=""> 
         
    </div>
</body>

</html>
